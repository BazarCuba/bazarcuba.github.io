<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazarCuba | Tu Catálogo de Anuncios</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #f0f4f8; }

        header { background: linear-gradient(135deg, #0056b3 0%, #003d82 100%); padding: 18px 15px 14px; color: white; text-align: center; position: relative; box-shadow: 0 3px 10px rgba(0,0,0,0.3); }
        header h1 { margin: 0; font-size: 26px; letter-spacing: 1px; }
        header p { margin: 4px 0 0; font-size: 13px; opacity: 0.85; }

        .filter-container { background: white; padding: 10px 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); margin-bottom: 15px; display: flex; gap: 8px; align-items: center; }
        .filter-container select { flex: 1; padding: 9px 12px; border-radius: 25px; border: 2px solid #0056b3; font-size: 14px; font-weight: bold; color: #0056b3; background: white; outline: none; cursor: pointer; }
        #btn-vista-toggle { padding: 9px 13px; border-radius: 25px; border: 2px solid #0056b3; background: white; color: #0056b3; font-weight: bold; font-size: 13px; cursor: pointer; white-space: nowrap; }
        #btn-vista-toggle.activo { background: #0056b3; color: white; }

        .grid-tiendas { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 10px 20px; max-width: 1200px; margin: 0 auto; }

        .card { background: white; border-radius: 14px; box-shadow: 0 3px 12px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
        .card h3 { margin: 8px 8px 2px; color: #222; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p.provincia { margin: 0 8px 4px; color: #888; font-size: 11px; font-weight: bold; }
        .precio-row { display: flex; align-items: center; gap: 5px; margin: 0 8px 6px; flex-wrap: wrap; }
        .precio-tag { color: #d32f2f; font-size: 15px; font-weight: bold; }
        .moneda-tag { color: #0056b3; font-size: 12px; font-weight: bold; background: #e8f4fd; padding: 2px 6px; border-radius: 10px; }
        .btn-descripcion { background: none; border: none; cursor: pointer; padding: 2px; display: flex; align-items: center; }

        .card-buttons { display: flex; gap: 6px; padding: 6px 8px 10px; }
        .card-buttons a, .card-buttons button { flex: 1; padding: 8px 4px; border-radius: 12px; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; }
        .btn-llamar { background-color: #e8f5e9; }
        .btn-wa { background-color: #e8fdf0; }
        .btn-mapa-card { background-color: #fff3e0; }
        .btn-tienda { background-color: #e8f4fd; }
        .btn-llamar svg, .btn-wa svg, .btn-mapa-card svg { width: 26px; height: 26px; }

        .carousel-container { position: relative; width: 100%; height: 130px; background-color: #e8edf2; overflow: hidden; }
        .carousel-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 0.5s; cursor: pointer; z-index: 1; pointer-events: none; }
        .carousel-img.active { opacity: 1; z-index: 2; pointer-events: auto; }
        .prev, .next { cursor: pointer; position: absolute; top: 50%; width: auto; padding: 5px 9px; margin-top: -16px; color: white; font-weight: bold; font-size: 13px; border-radius: 0 3px 3px 0; user-select: none; background-color: rgba(0,0,0,0.45); border: none; z-index: 5; }
        .next { right: 0; border-radius: 3px 0 0 3px; }
        .badge-agotado { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.75); color: white; padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 12px; z-index: 6; text-transform: uppercase; letter-spacing: 1px; }

        #vista-mapa { display: none; padding: 10px; }
        #mapa-principal { height: 70vh; width: 100%; border: 3px solid #0056b3; border-radius: 12px; }
        #mapa-container { display: none; margin: 15px auto; max-width: 1200px; padding: 0 10px; }
        #mapa { height: 350px; width: 100%; border: 3px solid #0056b3; border-radius: 12px; z-index: 1; }

        #banner-tienda { display: none; background: linear-gradient(135deg, #0056b3, #003d82); color: white; padding: 14px 16px; margin: 0 10px 12px; border-radius: 14px; }
        #banner-tienda h2 { margin: 0 0 4px; font-size: 18px; }
        #banner-tienda p { margin: 0; font-size: 13px; opacity: 0.85; }
        .banner-botones { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        #btn-volver-catalogo { background: white; color: #0056b3; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; cursor: pointer; }
        #btn-copiar-link-banner { background: rgba(255,255,255,0.2); color: white; border: 1.5px solid rgba(255,255,255,0.5); padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; cursor: pointer; }

        #header-tienda-directa { display: none; background: linear-gradient(135deg, #0056b3, #003d82); color: white; padding: 16px; text-align: center; }
        #header-tienda-directa h2 { margin: 0 0 4px; font-size: 20px; }
        #header-tienda-directa p { margin: 0; font-size: 13px; opacity: 0.85; }
        #btn-ver-otras-tiendas { margin-top: 10px; background: rgba(255,255,255,0.2); color: white; border: 1.5px solid rgba(255,255,255,0.5); padding: 7px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; cursor: pointer; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 22px; border-radius: 25px; font-size: 14px; font-weight: bold; z-index: 99999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
        #toast.show { opacity: 1; }

        /* MODALES BONITOS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.55); z-index: 9998; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: white; border-radius: 20px; padding: 28px 24px; max-width: 340px; width: 100%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); animation: slideUp 0.2s ease; }
        .modal-icon { font-size: 48px; margin-bottom: 12px; }
        .modal-texto { margin: 0 0 20px; color: #333; font-size: 15px; line-height: 1.5; font-weight: 500; white-space: pre-line; }
        .modal-btn-ok { background: linear-gradient(135deg, #0056b3, #003d82); color: white; border: none; padding: 12px 32px; border-radius: 25px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btn-cancel { flex: 1; background: #f0f0f0; color: #333; border: none; padding: 12px; border-radius: 25px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .modal-btn-confirm { flex: 1; background: linear-gradient(135deg, #d32f2f, #b71c1c); color: white; border: none; padding: 12px; border-radius: 25px; font-size: 14px; font-weight: bold; cursor: pointer; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.94); z-index: 9999; align-items: center; justify-content: center; }
        #lightbox.active { display: flex; }
        #lightbox-img { max-width: 95vw; max-height: 85vh; object-fit: contain; border-radius: 8px; display: block; }
        #lightbox-close { position: fixed; top: 16px; right: 20px; color: white; font-size: 38px; cursor: pointer; font-weight: bold; z-index: 10000; }
        #lightbox-prev, #lightbox-next { position: fixed; top: 50%; transform: translateY(-50%); color: white; font-size: 28px; cursor: pointer; background: rgba(255,255,255,0.18); border: none; padding: 12px 16px; border-radius: 10px; z-index: 10000; }
        #lightbox-prev { left: 10px; }
        #lightbox-next { right: 10px; }

        #modal-desc { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 8000; align-items: center; justify-content: center; padding: 20px; }
        #modal-desc.active { display: flex; }
        #modal-desc-box { background: white; border-radius: 16px; padding: 24px; max-width: 400px; width: 100%; }
        #modal-desc-box h3 { margin: 0 0 12px; color: #0056b3; }
        #modal-desc-box p { margin: 0; color: #333; font-size: 15px; line-height: 1.6; }
        #modal-desc-close { margin-top: 18px; width: 100%; padding: 10px; background: #0056b3; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }

        #side-menu { position: fixed; right: -300px; top: 0; width: 280px; height: 100%; background: white; transition: 0.3s; z-index: 3000; box-shadow: -5px 0 20px rgba(0,0,0,0.2); padding: 20px; overflow-y: auto; }

        .vendor-panel { padding: 0 10px 30px; max-width: 600px; margin: 0 auto; }
        .seccion-card { background: white; border-radius: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); padding: 18px; margin-bottom: 16px; }
        .seccion-card h3 { margin: 0 0 14px; color: #0056b3; font-size: 16px; border-bottom: 2px solid #e8f4fd; padding-bottom: 8px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: bold; color: #444; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #0056b3; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        .btn-guardar { background: linear-gradient(135deg, #ffcc00, #ffaa00); color: #333; padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-size: 15px; font-weight: bold; }
        .btn-secundario { background: #f0f4f8; color: #0056b3; padding: 10px 20px; border: 2px solid #0056b3; border-radius: 10px; cursor: pointer; width: 100%; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .btn-copiar-link { background: #e8f4fd; color: #0056b3; padding: 10px 16px; border: 2px solid #0056b3; border-radius: 10px; cursor: pointer; width: 100%; font-size: 14px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; }

        #mapa-selector { height: 220px; width: 100%; border-radius: 10px; border: 2px solid #0056b3; margin-top: 6px; }
        #coords-display { font-size: 11px; color: #666; margin-top: 4px; text-align: center; }

        .producto-vendedor { background: #f8fafc; border-radius: 12px; margin-bottom: 10px; overflow: hidden; border: 1px solid #e8edf2; }
        .producto-vendedor-top { display: flex; gap: 10px; padding: 10px; align-items: center; }
        .producto-vendedor-top img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
        .producto-vendedor-info { flex: 1; }
        .producto-vendedor-info strong { font-size: 13px; color: #222; display: block; }
        .producto-vendedor-info span { font-size: 12px; color: #d32f2f; font-weight: bold; }
        .producto-acciones { display: flex; border-top: 1px solid #e8edf2; }
        .producto-acciones button { flex: 1; padding: 9px 4px; border: none; background: none; cursor: pointer; font-size: 11px; font-weight: bold; color: #555; border-right: 1px solid #e8edf2; }
        .producto-acciones button:last-child { border-right: none; }
        .producto-acciones button:hover { background: #f0f4f8; }
        .btn-acc-agotado { color: #e65100 !important; }
        .btn-acc-habilitar { color: #2e7d32 !important; }
        .btn-acc-borrar { color: red !important; }

        #form-nuevo-producto { display: none; margin-top: 12px; border-top: 2px dashed #ddd; padding-top: 14px; }
        #menu-dots { position: absolute; top: 18px; right: 18px; font-size: 28px; cursor: pointer; color: white; z-index: 1001; }
    </style>
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL MENSAJE -->
<div class="modal-overlay" id="modal-msg">
    <div class="modal-box">
        <div class="modal-icon" id="modal-msg-icon"></div>
        <p class="modal-texto" id="modal-msg-texto"></p>
        <button class="modal-btn-ok" onclick="cerrarMsg()">Aceptar</button>
    </div>
</div>

<!-- MODAL CONFIRMAR -->
<div class="modal-overlay" id="modal-confirm">
    <div class="modal-box">
        <div class="modal-icon">🤔</div>
        <p class="modal-texto" id="modal-confirm-texto"></p>
        <div class="modal-btns">
            <button class="modal-btn-cancel" onclick="resolverConfirm(false)">Cancelar</button>
            <button class="modal-btn-confirm" onclick="resolverConfirm(true)">Confirmar</button>
        </div>
    </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="if(event.target===this)cerrarLightbox()">
    <span id="lightbox-close" onclick="cerrarLightbox()">✕</span>
    <button id="lightbox-prev" onclick="lightboxNav(-1)">❮</button>
    <img id="lightbox-img" src="" alt="">
    <button id="lightbox-next" onclick="lightboxNav(1)">❯</button>
</div>

<!-- MODAL DESCRIPCION -->
<div id="modal-desc" onclick="if(event.target===this)cerrarDesc()">
    <div id="modal-desc-box">
        <h3 id="modal-desc-titulo"></h3>
        <p id="modal-desc-texto"></p>
        <button id="modal-desc-close" onclick="cerrarDesc()">Cerrar</button>
    </div>
</div>

<div id="menu-dots" onclick="toggleMenu()">⋮</div>

<div id="side-menu">
    <button onclick="toggleMenu()" style="background:#ff4444;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;float:right;font-weight:bold;">✕ Cerrar</button>
    <h2 style="margin-top:45px;color:#0056b3;">BazarCuba 🇨🇺</h2>
    <hr style="border-color:#eee;">
    <button id="btn-add-negocio" onclick="mostrarPanelVendedor()" style="width:100%;padding:14px;background:linear-gradient(135deg,#0056b3,#003d82);color:white;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin-top:10px;font-size:15px;">➕ Añadir negocio</button>
    <button id="btn-cerrar-sesion" onclick="cerrarSesion()" style="display:none;width:100%;padding:10px;background:#f0f0f0;color:#333;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin-top:10px;">🚪 Cerrar Sesión</button>
    <div id="opciones-auth" style="display:none;margin-top:20px;text-align:center;">
        <button onclick="mostrarFormAuth('login')" style="width:47%;padding:10px;background:#e8f4fd;border:2px solid #0056b3;border-radius:8px;cursor:pointer;font-weight:bold;color:#0056b3;">Entrar</button>
        <button onclick="mostrarFormAuth('registro')" style="width:47%;padding:10px;background:#fff3e0;border:2px solid #ffaa00;border-radius:8px;cursor:pointer;font-weight:bold;color:#e65100;">Registrarse</button>
    </div>
    <div id="auth-container" style="display:none;margin-top:20px;border:1.5px solid #ddd;padding:15px;border-radius:10px;">
        <h3 id="auth-title" style="margin-top:0;font-size:16px;color:#0056b3;"></h3>
        <p style="font-size:12px;color:#e65100;margin:0 0 10px;">⚠️ Necesitas VPN activado para iniciar sesión</p>
        <input type="email" id="auth-email" placeholder="Correo electrónico" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;margin-bottom:10px;font-size:14px;">
        <input type="password" id="auth-pass" placeholder="Contraseña (mín 6 letras)" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;">
        <button id="btn-auth-accion" onclick="hacerLogin()" style="width:100%;margin-top:12px;padding:11px;background:linear-gradient(135deg,#0056b3,#003d82);color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:15px;">Continuar</button>
    </div>
</div>

<header>
    <h1>BazarCuba 🇨🇺</h1>
    <p>Encuentra lo que buscas en tu provincia</p>
</header>

<div id="header-tienda-directa">
    <h2 id="hd-nombre"></h2>
    <p id="hd-info"></p>
    <button id="btn-ver-otras-tiendas" onclick="verCatalogoCompleto()">🏪 Ver otras tiendas</button>
</div>

<div class="filter-container" id="filtro-container">
    <select id="filtroProvincia" onchange="filtrarPorProvincia()">
        <option value="todas">📍 Todas las provincias</option>
        <option value="Pinar del Río">Pinar del Río</option>
        <option value="Artemisa">Artemisa</option>
        <option value="La Habana">La Habana</option>
        <option value="Mayabeque">Mayabeque</option>
        <option value="Matanzas">Matanzas</option>
        <option value="Cienfuegos">Cienfuegos</option>
        <option value="Villa Clara">Villa Clara</option>
        <option value="Sancti Spíritus">Sancti Spíritus</option>
        <option value="Ciego de Ávila">Ciego de Ávila</option>
        <option value="Camagüey">Camagüey</option>
        <option value="Las Tunas">Las Tunas</option>
        <option value="Holguín">Holguín</option>
        <option value="Granma">Granma</option>
        <option value="Santiago de Cuba">Santiago de Cuba</option>
        <option value="Guantánamo">Guantánamo</option>
        <option value="Isla de la Juventud">Isla de la Juventud</option>
    </select>
    <button id="btn-vista-toggle" onclick="toggleVista()">🗺️ Mapa</button>
</div>

<div id="vista-mapa"><div id="mapa-principal"></div></div>

<div id="banner-tienda">
    <h2 id="banner-nombre"></h2>
    <p id="banner-info"></p>
    <div class="banner-botones">
        <button id="btn-volver-catalogo" onclick="volverAlCatalogo()">← Volver</button>
        <button id="btn-copiar-link-banner" onclick="copiarLink()">🔗 Copiar link</button>
    </div>
</div>

<div id="listaTiendas" class="grid-tiendas">
    <p style="text-align:center;width:100%;color:#888;grid-column:1/-1;">Conectando con BazarCuba...</p>
</div>

<div id="mapa-container">
    <h3 style="color:#0056b3;margin:0 0 8px 10px;">📍 Ubicación:</h3>
    <div id="mapa"></div>
</div>

<div id="panelVendedor" style="display:none;">
    <div class="vendor-panel">
        <div class="seccion-card">
            <h3>🏪 Información de tu Tienda</h3>
            <div class="form-group"><label>Nombre de la Tienda:</label><input type="text" id="v-nombre" placeholder="Ej. Tienda de Ropa de María"></div>
            <div class="form-group"><label>Teléfono / WhatsApp:</label><input type="tel" id="v-tel" placeholder="+53 51234567"></div>
            <div class="form-group"><label>Dirección:</label><input type="text" id="v-dir" placeholder="Ej. Calle 23 #456, Vedado"></div>
            <div class="form-group">
                <label>Provincia:</label>
                <select id="v-prov">
                    <option value="">-- Elige una provincia --</option>
                    <option value="Pinar del Río">Pinar del Río</option>
                    <option value="Artemisa">Artemisa</option>
                    <option value="La Habana">La Habana</option>
                    <option value="Mayabeque">Mayabeque</option>
                    <option value="Matanzas">Matanzas</option>
                    <option value="Cienfuegos">Cienfuegos</option>
                    <option value="Villa Clara">Villa Clara</option>
                    <option value="Sancti Spíritus">Sancti Spíritus</option>
                    <option value="Ciego de Ávila">Ciego de Ávila</option>
                    <option value="Camagüey">Camagüey</option>
                    <option value="Las Tunas">Las Tunas</option>
                    <option value="Holguín">Holguín</option>
                    <option value="Granma">Granma</option>
                    <option value="Santiago de Cuba">Santiago de Cuba</option>
                    <option value="Guantánamo">Guantánamo</option>
                    <option value="Isla de la Juventud">Isla de la Juventud</option>
                </select>
            </div>
            <div class="form-group">
                <label>📍 Ubicación en el mapa:</label>
                <div id="mapa-selector"></div>
                <p id="coords-display">Toca el mapa para marcar tu ubicación</p>
            </div>
            <button class="btn-guardar" onclick="guardarInfoTienda()">💾 Guardar Info de Tienda</button>
        </div>

        <div class="seccion-card" id="seccion-productos">
            <h3>📦 Mis Productos</h3>
            <button class="btn-copiar-link" onclick="copiarLink()">🔗 Copiar link de mi tienda</button>
            <div id="lista-mis-productos"><p style="color:#888;text-align:center;font-size:13px;">Cargando...</p></div>
            <button class="btn-secundario" onclick="toggleFormProducto()">➕ Agregar nuevo producto</button>
            <div id="form-nuevo-producto">
                <div style="border:2px dashed #ccc;padding:14px;text-align:center;margin-bottom:12px;border-radius:10px;cursor:pointer;background:#fafafa;" onclick="document.getElementById('input-fotos').click()">
                    <p id="preview-text" style="margin:0;color:#888;font-size:13px;">📸 Toca para agregar fotos</p>
                    <div id="preview-container" style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:8px;"></div>
                    <input type="file" id="input-fotos" accept="image/*" multiple style="display:none;" onchange="previsualizarFotos(event)">
                </div>
                <div class="form-group"><label>Nombre del Producto:</label><input type="text" id="p-nombre" placeholder="Ej. Vestido de verano"></div>
                <div class="form-row">
                    <div class="form-group"><label>Precio:</label><input type="text" id="p-precio" placeholder="500"></div>
                    <div class="form-group"><label>Moneda:</label><select id="p-moneda"><option value="CUP">CUP</option><option value="USD">USD</option></select></div>
                </div>
                <div class="form-group">
                    <label>Descripción <span style="color:#aaa;font-weight:normal;">(opcional)</span>:</label>
                    <textarea id="p-desc" rows="2" placeholder="Describe el producto..."></textarea>
                </div>
                <button class="btn-guardar" onclick="publicarProducto()">📤 Publicar Producto</button>
            </div>
        </div>
    </div>
</div>

<script>

    function guardarCambioLocal(id, cambios) {
        const locales = JSON.parse(localStorage.getItem('bc_cambios') || '{}');
        if (cambios === null) {
            // null = eliminado
            locales[id] = { _eliminado: true };
        } else {
            locales[id] = Object.assign(locales[id] || {}, cambios);
        }
        localStorage.setItem('bc_cambios', JSON.stringify(locales));
    }

    function aplicarCambiosLocales(lista) {
        const locales = JSON.parse(localStorage.getItem('bc_cambios') || '{}');
        if (!Object.keys(locales).length) return lista;
        // Filtrar eliminados y aplicar cambios
        return lista
            .filter(t => !locales[t.id]?._eliminado)
            .map(t => locales[t.id] ? Object.assign({}, t, locales[t.id]) : t);
    }

    function agregarProductoLocal(producto) {
        const locales = JSON.parse(localStorage.getItem('bc_nuevos') || '[]');
        locales.push(producto);
        localStorage.setItem('bc_nuevos', JSON.stringify(locales));
    }

    function obtenerNuevosLocales() {
        return JSON.parse(localStorage.getItem('bc_nuevos') || '[]');
    }

    async function cargarDatos() {
        try {
            // 1. Intentar Worker (rápido, sin VPN)
            // 2. Si falla, intentar datos.json de GitHub (sin VPN, puede estar desactualizado)
            // 3. Si falla, intentar Firestore directo (necesita VPN)
            let data;
            try {
                const r = await Promise.race([
                    fetch(`${WORKER}/get-anuncios`),
                    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000))
                ]);
                if (!r.ok) throw new Error('Worker HTTP ' + r.status);
                data = await r.json();
            } catch(e1) {
                try {
                    const r2 = await fetch('/datos.json?v=' + Date.now());
                    if (!r2.ok) throw new Error('datos.json HTTP ' + r2.status);
                    data = await r2.json();
                } catch(e2) {
                    const r3 = await fetch(`${FS}/tiendas?key=${API_KEY}&pageSize=300`);
                    if (!r3.ok) throw new Error('No se pudieron cargar los datos.');
                    data = await r3.json();
                }
            }
            if (data.documents) {
                let lista = data.documents.map(doc => {
                    const f = doc.fields || {};
                    return {
                        id: doc.name.split('/').pop(),
                        uidVendedor: f.uidVendedor?.stringValue || '',
                        nombre: f.nombre?.stringValue || 'Sin nombre',
                        nombreTienda: f.nombreTienda?.stringValue || '',
                        precio: f.precio?.stringValue || 'N/A',
                        moneda: f.moneda?.stringValue || '',
                        descripcion: f.descripcion?.stringValue || '',
                        direccion: f.direccion?.stringValue || '',
                        provincia: f.provincia?.stringValue || 'N/A',
                        fotos: f.fotos?.arrayValue?.values?.map(v => v.stringValue) || [f.fotoUrl?.stringValue || 'https://via.placeholder.com/300'],
                        estado: f.estado?.stringValue || 'disponible',
                        tel: f.tel?.stringValue || '',
                        lat: f.lat?.doubleValue || 23.11,
                        lng: f.lng?.doubleValue || -82.36
                    };
                });

                // Aplicar cambios locales pendientes
                lista = aplicarCambiosLocales(lista);

                // Agregar productos nuevos locales que aún no están en datos.json
                const nuevos = obtenerNuevosLocales();
                const idsExistentes = new Set(lista.map(t => t.id));
                nuevos.forEach(n => { if (!idsExistentes.has(n.id)) lista.push(n); });

                // Limpiar locales cuyos IDs ya están en datos.json con los cambios aplicados
                // (significa que el workflow ya los actualizó)
                limpiarLocalesObsoletos(lista, data.documents);

                tiendasData = lista;
                if (modoDirecto) mostrarDirecto();
                else renderizar(tiendasData);
            } else {
                document.getElementById('listaTiendas').innerHTML = "<p style='grid-column:1/-1;text-align:center;color:#888;'>No hay anuncios disponibles.</p>";
            }
        } catch(e) {
            document.getElementById('listaTiendas').innerHTML = `<p style='grid-column:1/-1;text-align:center;color:#888;'>Error al cargar: ${e.message}</p>`;
        }
    }

    function limpiarLocalesObsoletos(listaFinal, docsOriginales) {
        // Si un cambio local ya está reflejado en datos.json, eliminarlo
        const locales = JSON.parse(localStorage.getItem('bc_cambios') || '{}');
        const nuevos = JSON.parse(localStorage.getItem('bc_nuevos') || '[]');
        const idsEnServer = new Set(docsOriginales.map(d => d.name.split('/').pop()));

        // Limpiar cambios de IDs que ya existen en el servidor
        // (significa el workflow ya sincronizó)
        let hayLocales = false;
        Object.keys(locales).forEach(id => {
            if (idsEnServer.has(id)) {
                const docServer = docsOriginales.find(d => d.name.split('/').pop() === id);
                if (docServer) {
                    const fServer = docServer.fields || {};
                    const estadoServer = fServer.estado?.stringValue || 'disponible';
                    const localCambio = locales[id];
                    // Si el estado en servidor ya coincide con el local, limpiar
                    if (localCambio.estado && localCambio.estado === estadoServer) {
                        delete locales[id];
                    } else if (localCambio._eliminado && !idsEnServer.has(id)) {
                        delete locales[id];
                    } else {
                        hayLocales = true;
                    }
                }
            }
        });

        // Limpiar nuevos que ya están en el servidor
        const nuevosActualizados = nuevos.filter(n => !idsEnServer.has(n.id));

        localStorage.setItem('bc_cambios', JSON.stringify(locales));
        localStorage.setItem('bc_nuevos', JSON.stringify(nuevosActualizados));
    }

    // SVGs
    const svgTel = `<svg viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="#4CAF50"/><path d="M6.5 7.5C6.5 6.67 7.17 6 8 6h1.5c.28 0 .53.15.66.38l1.5 2.5c.16.27.1.61-.13.82L10.7 10.5c.52 1.1 1.2 1.78 2.3 2.3l.8-.83c.21-.23.55-.29.82-.13l2.5 1.5c.23.13.38.38.38.66V16c0 .83-.67 1.5-1.5 1.5C9.49 17.5 6.5 14.51 6.5 7.5z" fill="white"/></svg>`;
    const svgWA = `<svg viewBox="0 0 24 24"><rect width="24" height="24" rx="6" fill="#25D366"/><path d="M12 4C7.58 4 4 7.58 4 12c0 1.42.37 2.75 1.02 3.91L4 20l4.18-1.01C9.3 19.63 10.62 20 12 20c4.42 0 8-3.58 8-8s-3.58-8-8-8zm3.93 11.07c-.16.45-.94.88-1.29.93-.33.05-.74.07-1.19-.07-.27-.09-.63-.2-1.08-.4-1.89-.82-3.13-2.73-3.22-2.86-.09-.13-.76-1.01-.76-1.93s.48-1.37.65-1.56c.17-.19.37-.23.49-.23.12 0 .25 0 .36.01.11 0 .27-.04.42.32.16.37.54 1.31.59 1.4.05.09.08.2.02.32-.06.12-.09.19-.18.3-.09.1-.19.23-.27.31-.09.09-.18.18-.08.36.1.18.46.75.98 1.22.67.6 1.24.79 1.42.88.18.09.28.07.39-.04.11-.12.46-.54.58-.72.12-.18.24-.15.41-.09.17.06 1.1.52 1.29.61.19.09.31.13.36.2.05.11.05.61-.11 1.06z" fill="white"/></svg>`;
    const svgGPS = `<svg viewBox="0 0 24 24"><rect width="24" height="24" rx="6" fill="white"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#EA4335"/><path d="M12 2C8.13 2 5 5.13 5 9c0 1.8.6 3.46 1.6 4.8L12 2z" fill="#FBBC05"/><path d="M12 2v7l5.4 7.8C18.4 15.46 19 13.8 19 12c0-3.87-3.13-7-7-7z" fill="#4285F4"/><circle cx="12" cy="9" r="2.5" fill="white"/></svg>`;
    const svgTienda = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="24" rx="6" fill="#e8f4fd"/><path d="M4 7h16l-1.5 9H5.5L4 7z" fill="#0056b3" opacity="0.15"/><path d="M4 7h16l-1.5 9H5.5L4 7z" stroke="#0056b3" stroke-width="1.5" fill="none"/><path d="M9 7V5.5A1.5 1.5 0 0110.5 4h3A1.5 1.5 0 0115 5.5V7" stroke="#0056b3" stroke-width="1.5" fill="none"/><rect x="10" y="11" width="4" height="3" rx="0.5" fill="#0056b3"/></svg>`;
    const svgDoc = `<svg viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="5" fill="#e8f4fd"/><path d="M7 6h10v2H7zM7 10h10v2H7zM7 14h6v2H7z" fill="#0056b3"/><path d="M5 4h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1z" stroke="#0056b3" stroke-width="1.5" fill="none"/></svg>`;

    // ============================================================
    // RENDERIZAR
    // ============================================================
    function renderizar(lista) {
        const c = document.getElementById('listaTiendas');
        c.innerHTML = '';
        if (!lista || !lista.length) {
            c.innerHTML = "<p style='grid-column:1/-1;text-align:center;color:#888;'>No hay productos disponibles.</p>";
            return;
        }
        lista.forEach(t => {
            try {
                const ag = t.estado === 'agotado';
                const fe = encodeURIComponent(JSON.stringify(t.fotos));
                const ns = (t.nombre||'Sin nombre').replace(/'/g,"\\'").replace(/"/g,'&quot;');
                const ds = (t.descripcion||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
                const tel = (t.tel||'').replace(/\D/g,'');
                let imgs = t.fotos.map((f,i) => `<img src="${f}" class="carousel-img ${i===0?'active':''}" onclick="abrirLightbox('${fe}',${i})">`).join('');
                const ctrl = t.fotos.length > 1 ? `<button class="prev" onclick="event.stopPropagation();cambiarFoto('${t.id}',-1)">❮</button><button class="next" onclick="event.stopPropagation();cambiarFoto('${t.id}',1)">❯</button>` : '';
                c.insertAdjacentHTML('beforeend', `
                    <div class="card" id="card-${t.id}" style="opacity:${ag?'0.65':'1'}">
                        <div class="carousel-container">${imgs}${ctrl}${ag?'<div class="badge-agotado">AGOTADO</div>':''}</div>
                        <h3>${t.nombre||'Sin nombre'}</h3>
                        <div class="precio-row">
                            <span class="precio-tag">${t.precio}</span>
                            ${t.moneda?`<span class="moneda-tag">${t.moneda}</span>`:''}
                            ${t.descripcion?`<button class="btn-descripcion" onclick="abrirDesc('${ns}','${ds}')">${svgDoc}</button>`:''}
                        </div>
                        <p class="provincia">📍 ${t.provincia}</p>
                        <div class="card-buttons">
                            <a href="tel:${t.tel}" class="btn-llamar">${svgTel}</a>
                            <a href="https://wa.me/${tel}" target="_blank" class="btn-wa">${svgWA}</a>
                            <button class="btn-mapa-card" onclick="verUbicacion(${t.lat},${t.lng},'${ns}')">${svgGPS}</button>
                            <button class="btn-tienda" onclick="visitarTienda('${t.uidVendedor}')" title="Ver tienda">${svgTienda}</button>
                        </div>
                    </div>`);
            } catch(e) { console.error('Error card:', t.id, e); }
        });
    }

    window.cambiarFoto = function(id, d) {
        const imgs = document.querySelectorAll(`#card-${id} .carousel-img`);
        let idx = Array.from(imgs).findIndex(i => i.classList.contains('active'));
        imgs[idx].classList.remove('active');
        idx = (idx + d + imgs.length) % imgs.length;
        imgs[idx].classList.add('active');
    };

    // ============================================================
    // ACCIONES FIREBASE
    // ============================================================
    window.guardarInfoTienda = async function() {
        if (!usuarioUID) { await showMsg('Inicia sesión con VPN para guardar.', 'warning'); return; }
        const mis = tiendasData.filter(t => t.uidVendedor === usuarioUID);
        if (!mis.length) { await showMsg('Primero publica al menos un producto.', 'warning'); return; }
        const btn = document.querySelector('#panelVendedor .seccion-card .btn-guardar');
        btn.innerText = 'Guardando... ⏳'; btn.disabled = true;
        const campos = { nombreTienda: document.getElementById('v-nombre').value, tel: document.getElementById('v-tel').value, direccion: document.getElementById('v-dir').value, provincia: document.getElementById('v-prov').value };
        try {
            const token = await getToken();
            const masks = Object.keys(campos).map(k => `updateMask.fieldPaths=${k}`).join('&') + '&updateMask.fieldPaths=lat&updateMask.fieldPaths=lng';
            await Promise.all(mis.map(p => {
                const pay = { fields: {} };
                Object.entries(campos).forEach(([k,v]) => { pay.fields[k] = { stringValue: v }; });
                pay.fields.lat = { doubleValue: latSel }; pay.fields.lng = { doubleValue: lngSel };
                return fetch(`${FS}/tiendas/${p.id}?${masks}&key=${API_KEY}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(pay) });
            }));
            // Actualizar en memoria y en local
            tiendasData.forEach(t => {
                if (t.uidVendedor === usuarioUID) {
                    Object.assign(t, campos); t.lat = latSel; t.lng = lngSel;
                    guardarCambioLocal(t.id, Object.assign({}, campos, { lat: latSel, lng: lngSel }));
                }
            });
            renderizarMisProductos(tiendasData.filter(t => t.uidVendedor === usuarioUID));
            await showMsg('✅ Información guardada.' + MSG10, 'ok');
            btn.innerText = '💾 Guardar Info de Tienda'; btn.disabled = false;
        } catch(e) { await showMsg('❌ ' + e.message, 'error'); btn.innerText = '💾 Guardar Info de Tienda'; btn.disabled = false; }
    };

    window.borrarAnuncio = async function(id) {
        if (!usuarioUID) { await showMsg('Inicia sesión con VPN.', 'warning'); return; }
        if (!await showConfirm('¿Seguro que quieres eliminar este producto?')) return;
        try {
            const token = await getToken();
            const r = await fetch(`${FS}/tiendas/${id}?key=${API_KEY}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            if (r.ok) {
                tiendasData = tiendasData.filter(t => t.id !== id);
                guardarCambioLocal(id, null); // null = eliminado
                renderizarMisProductos(tiendasData.filter(t => t.uidVendedor === usuarioUID));
                await showMsg('✅ Producto eliminado.' + MSG10, 'ok');
            } else { await showMsg('❌ ' + await r.text(), 'error'); }
        } catch(e) { await showMsg('❌ ' + e.message, 'error'); }
    };

    window.marcarAgotado = async function(id) {
        if (!usuarioUID) { await showMsg('Inicia sesión con VPN.', 'warning'); return; }
        if (!await showConfirm('¿Marcar este producto como AGOTADO?')) return;
        try {
            const token = await getToken();
            const r = await fetch(`${FS}/tiendas/${id}?updateMask.fieldPaths=estado&key=${API_KEY}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ fields: { estado: { stringValue: 'agotado' } } }) });
            if (r.ok) {
                const t = tiendasData.find(t => t.id === id); if (t) t.estado = 'agotado';
                guardarCambioLocal(id, { estado: 'agotado' });
                renderizarMisProductos(tiendasData.filter(t => t.uidVendedor === usuarioUID));
                await showMsg('✅ Marcado como agotado.' + MSG10, 'ok');
            } else { await showMsg('❌ ' + await r.text(), 'error'); }
        } catch(e) { await showMsg('❌ ' + e.message, 'error'); }
    };

    window.habilitarProducto = async function(id) {
        if (!usuarioUID) { await showMsg('Inicia sesión con VPN.', 'warning'); return; }
        if (!await showConfirm('¿Habilitar este producto nuevamente?')) return;
        try {
            const token = await getToken();
            const r = await fetch(`${FS}/tiendas/${id}?updateMask.fieldPaths=estado&key=${API_KEY}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ fields: { estado: { stringValue: 'disponible' } } }) });
            if (r.ok) {
                const t = tiendasData.find(t => t.id === id); if (t) t.estado = 'disponible';
                guardarCambioLocal(id, { estado: 'disponible' });
                renderizarMisProductos(tiendasData.filter(t => t.uidVendedor === usuarioUID));
                await showMsg('✅ Producto habilitado.' + MSG10, 'ok');
            } else { await showMsg('❌ ' + await r.text(), 'error'); }
        } catch(e) { await showMsg('❌ ' + e.message, 'error'); }
    };

    window.gestionarFoto = async function(id, accion) {
        if (!usuarioUID) { await showMsg('Inicia sesión con VPN.', 'warning'); return; }
        const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = async e => {
            const file = e.target.files[0]; if (!file) return;
            toast('📤 Subiendo imagen...');
            try {
                const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', 'bazar_present');
                const ri = await fetch('https://api.cloudinary.com/v1_1/dmeczxbyh/image/upload', { method: 'POST', body: fd });
                const di = await ri.json();
                if (!di.secure_url) throw new Error('Error subiendo imagen');
                const anuncio = tiendasData.find(t => t.id === id);
                let fotos = [...(anuncio.fotos || [])];
                if (accion === 'cambiar') fotos = [di.secure_url]; else fotos.push(di.secure_url);
                const token = await getToken();
                const r = await fetch(`${FS}/tiendas/${id}?updateMask.fieldPaths=fotos&key=${API_KEY}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ fields: { fotos: { arrayValue: { values: fotos.map(u => ({ stringValue: u })) } } } }) });
                if (r.ok) {
                    anuncio.fotos = fotos;
                    guardarCambioLocal(id, { fotos: fotos });
                    renderizarMisProductos(tiendasData.filter(t => t.uidVendedor === usuarioUID));
                    await showMsg('✅ Foto actualizada.' + MSG10, 'ok');
                } else { await showMsg('❌ ' + await r.text(), 'error'); }
            } catch(err) { await showMsg('❌ ' + err.message, 'error'); }
        };
        inp.click();
    };

    window.previsualizarFotos = function(e) {
        const c = document.getElementById('preview-container');
        c.innerHTML = ''; document.getElementById('preview-text').style.display = 'none';
        Array.from(e.target.files).forEach(f => {
            const r = new FileReader();
            r.onload = ev => { const img = document.createElement('img'); img.src = ev.target.result; img.style.cssText = 'width:60px;height:60px;object-fit:cover;border-radius:8px;border:2px solid #0056b3;'; c.appendChild(img); };
            r.readAsDataURL(f);
        });
    };

    window.publicarProducto = async function() {
        if (!usuarioUID) { await showMsg('Inicia sesión con VPN.', 'warning'); return; }
        const inp = document.getElementById('input-fotos');
        if (!inp.files.length) { await showMsg('Selecciona al menos una foto.', 'warning'); return; }
        const btn = document.querySelector('#form-nuevo-producto .btn-guardar');
        btn.innerText = 'Subiendo... ⏳'; btn.disabled = true;
        try {
            const urls = [];
            for (let i = 0; i < inp.files.length; i++) {
                const fd = new FormData(); fd.append('file', inp.files[i]); fd.append('upload_preset', 'bazar_present');
                const ri = await fetch('https://api.cloudinary.com/v1_1/dmeczxbyh/image/upload', { method: 'POST', body: fd });
                const di = await ri.json();
                if (!di.secure_url) throw new Error('Error subiendo foto ' + (i+1));
                urls.push(di.secure_url);
            }
            const mis = tiendasData.filter(t => t.uidVendedor === usuarioUID);
            const iT = mis[0] || {};
            const token = await getToken();
            const pay = { fields: {
                uidVendedor: { stringValue: usuarioUID },
                correo: { stringValue: fbAuth.currentUser.email },
                nombre: { stringValue: document.getElementById('p-nombre').value },
                precio: { stringValue: document.getElementById('p-precio').value },
                moneda: { stringValue: document.getElementById('p-moneda').value },
                descripcion: { stringValue: document.getElementById('p-desc').value.trim() },
                fotos: { arrayValue: { values: urls.map(u => ({ stringValue: u })) } },
                estado: { stringValue: 'disponible' },
                nombreTienda: { stringValue: iT.nombreTienda || document.getElementById('v-nombre').value || '' },
                tel: { stringValue: iT.tel || document.getElementById('v-tel').value || '' },
                direccion: { stringValue: iT.direccion || document.getElementById('v-dir').value || '' },
                provincia: { stringValue: iT.provincia || document.getElementById('v-prov').value || '' },
                lat: { doubleValue: iT.lat || latSel }, lng: { doubleValue: iT.lng || lngSel },
                fecha: { timestampValue: new Date().toISOString() }
            }};
            const r = await fetch(`${FS}/tiendas?key=${API_KEY}`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(pay) });
            if (!r.ok) throw new Error(await r.text());
            const doc = await r.json();
            const nuevo = { id: doc.name.split('/').pop(), uidVendedor: usuarioUID, nombre: document.getElementById('p-nombre').value, nombreTienda: iT.nombreTienda||'', precio: document.getElementById('p-precio').value, moneda: document.getElementById('p-moneda').value, descripcion: document.getElementById('p-desc').value.trim(), fotos: urls, estado: 'disponible', tel: iT.tel||'', direccion: iT.direccion||'', provincia: iT.provincia||'', lat: iT.lat||latSel, lng: iT.lng||lngSel };
            tiendasData.push(nuevo);
            agregarProductoLocal(nuevo);
            renderizarMisProductos(tiendasData.filter(t => t.uidVendedor === usuarioUID));
            // Limpiar form
            inp.value = ''; document.getElementById('preview-container').innerHTML = ''; document.getElementById('preview-text').style.display = 'block';
            document.getElementById('p-nombre').value = ''; document.getElementById('p-precio').value = ''; document.getElementById('p-desc').value = '';
            document.getElementById('form-nuevo-producto').style.display = 'none';
            await showMsg('✅ ¡Producto publicado!' + MSG10, 'ok');
            btn.innerText = '📤 Publicar Producto'; btn.disabled = false;
        } catch(e) { await showMsg('❌ ' + e.message, 'error'); btn.innerText = '📤 Publicar Producto'; btn.disabled = false; }
    };

    window.filtrarPorProvincia = function() {
        const f = document.getElementById('filtroProvincia').value;
        let r = f === 'todas' ? tiendasData : tiendasData.filter(t => t.provincia === f);
        if (tiendaUID) r = r.filter(t => t.uidVendedor === tiendaUID);
        renderizar(r);
    };

    window.verUbicacion = function(lat, lng, nombre) {
        document.getElementById('mapa-container').style.display = 'block';
        if (!map) { map = L.map('mapa').setView([lat,lng],14); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); }
        else map.setView([lat,lng],14);
        if (marcadorActual) map.removeLayer(marcadorActual);
        marcadorActual = L.marker([lat,lng]).addTo(map).bindPopup(`<b>${nombre}</b>`).openPopup();
        document.getElementById('mapa-container').scrollIntoView({ behavior: 'smooth' });
    };

    // ============================================================
    // INICIAR
    // ============================================================
    detectarDirecto();
    cargarDatos().then(() => restaurarSesion());
</script>
